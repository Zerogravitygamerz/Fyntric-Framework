<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoPixel Inventory UI - Fyntric Framework</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="qbcore-inventory">
        <div class="inv-container">
            <!-- Character Body Container -->
            <div class="player-body-container">
                <div class="player-body">
                    <img src="body.png" alt="Character Body" style="width: 198px; height: 428px;">
                </div>
                
                <!-- Equipment Slots positioned around character body -->
                <div class="equipment-slot" data-slot="head" style="position: absolute; top: 5%; left: 45%;">
                    <div class="item-slot-img"><i class="fas fa-hard-hat placeholder-icon"></i></div>
                </div>
                <div class="equipment-slot" data-slot="left-arm" style="position: absolute; top: 25%; left: 15%;">
                    <div class="item-slot-img"><i class="fas fa-tshirt placeholder-icon"></i></div>
                </div>
                <div class="equipment-slot" data-slot="right-arm" style="position: absolute; top: 25%; right: 15%;">
                    <div class="item-slot-img"><i class="fas fa-tshirt placeholder-icon"></i></div>
                </div>
                <div class="equipment-slot" data-slot="body" style="position: absolute; top: 35%; left: 45%;">
                    <div class="item-slot-img"><i class="fas fa-vest placeholder-icon"></i></div>
                </div>
                <div class="equipment-slot" data-slot="left-leg" style="position: absolute; top: 70%; left: 35%;">
                    <div class="item-slot-img"><i class="fas fa-shoe-prints placeholder-icon"></i></div>
                </div>
                <div class="equipment-slot" data-slot="right-leg" style="position: absolute; top: 70%; right: 35%;">
                    <div class="item-slot-img"><i class="fas fa-shoe-prints placeholder-icon"></i></div>
                </div>
            </div>

            <!-- Pockets Inventory -->
            <div class="pocket-inventory-icon">
                <i class="fas fa-pocket"></i>
            </div>
            <div class="pocket-inv-info">
                <div id="pocket-inv-label">Pockets</div>
            </div>
            <div class="player-inventory-first">
                <div class="inventory-grid" id="pocket-inventory">
                    <!-- Pocket inventory slots will be generated by JavaScript -->
                </div>
            </div>

            <!-- Player Inventory -->
            <div class="player-inventory-icon">
                <i class="fas fa-user"></i>
            </div>
            <div class="player-inv-info">
                <div id="player-inv-label">Player</div>
                <div id="player-inv-weight">0.70kg/160.00kg</div>
            </div>
            <div class="player-inventory">
                <div class="inventory-grid" id="player-inventory">
                    <!-- Player inventory slots will be generated by JavaScript -->
                </div>
            </div>

            <!-- Backpack Inventory -->
            <div class="backpack-inventory-icon">
                <i class="fas fa-backpack"></i>
            </div>
            <div class="backpack-inv-info">
                <div id="backpack-inv-label">Backpack</div>
            </div>
            <div class="player-inventory-backpack">
                <div class="inventory-grid" id="backpack-inventory">
                    <!-- Backpack inventory slots will be generated by JavaScript -->
                </div>
            </div>

            <!-- Other Inventory (24/7 Supermarket) -->
            <div class="other-inventory-icon">
                <i class="fas fa-store"></i>
            </div>
            <div class="other-inv-info">
                <div id="other-inv-label">24/7 Supermarket</div>
                <div id="other-inv-weight">0.00kg/100.00kg</div>
            </div>
            <div class="other-inventory">
                <div class="inventory-grid" id="other-inventory">
                    <!-- Other inventory slots will be generated by JavaScript -->
                </div>
            </div>

            <!-- Personal Information -->
            <div class="ply-number-line"></div>
            <div class="player-name-title">Name</div>
            <div class="player-name">POOYATEST</div>
            
            <div class="phone-number-line"></div>
            <div class="phone-number-title">Phone Number</div>
            <div class="phone-number">3062243113</div>
            
            <div class="player-id-line"></div>
            <div class="player-id-title">State ID</div>
            <div class="player-id">1</div>
            
            <div class="citizen-id-line"></div>
            <div class="citizen-id-title">Citizen ID</div>
            <div class="citizen-id">SQZ14967</div>

            <!-- Item Information Panel -->
            <div class="ply-iteminfo-container" style="display: none;">
                <div class="item-info-title">Item Name</div>
                <div class="item-info-line"></div>
                <div class="item-info-description">Item description goes here</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
